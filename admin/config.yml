backend:
  name: git-gateway
  branch: main

media_library:
  name: uploadcare
  config:
    publicKey: YOUR_UPLOADCARE_PUBLIC_KEY # Ganti dengan Public Key Uploadcare Anda

collections:
  - name: "settings"
    label: "Pengaturan Global"
    files:
      - file: "data/pengaturan.json"
        label: "Pengaturan Website"
        name: "site_settings"
        fields:
          - {label: "Nama Toko", name: "namaToko", widget: "string", default: "Oleh-Oleh Jogja"}
          - {label: "Nomor WhatsApp", name: "noWa", widget: "string", default: "6287839933992"}
          - {label: "Teks Pesan WhatsApp", name: "pesanWa", widget: "text", default: "Halo Admin Oleh-Oleh Jogja, saya ingin memesan:"}
          - {label: "Alamat", name: "alamat", widget: "string", default: "Jl. Malioboro, Kota Yogyakarta"}
          - {label: "Jam Operasional", name: "jamOperasional", widget: "string", default: "Senin - Minggu, 08.00 - 21.00 WIB"}
          - {label: "Warna Utama (HEX)", name: "warnaUtama", widget: "color", default: "#2c2416"}
          - {label: "Warna Aksen (HEX)", name: "warnaAksen", widget: "color", default: "#8b6f47"}

  - name: "data_katalog"
    label: "Katalog Produk"
    files:
      - file: "data/katalog.json"
        label: "Daftar Produk"
        name: "katalog"
        fields:
          - label: "Daftar Produk"
            name: "items"
            widget: "list"
            fields:
              - {label: "ID Produk", name: "id", widget: "number"}
              - {label: "Nama Produk", name: "nama", widget: "string"}
              - {label: "Kategori", name: "kategori", widget: "select", options: ["Makanan", "Minuman", "Snack", "Batik", "Kerajinan"]}
              - {label: "Harga", name: "harga", widget: "number"}
              - {label: "Berat/Ukuran", name: "berat", widget: "string"}
              - {label: "Gambar", name: "gambar", widget: "image"}
              - {label: "Deskripsi", name: "deskripsi", widget: "text"}
              - {label: "Jumlah Stok", name: "stok", widget: "number", default: 10}
              - {label: "Produk Terlaris", name: "hot", widget: "boolean", default: false, required: false}
              - {label: "Produk Baru", name: "new", widget: "boolean", default: false, required: false}
              - {label: "Tampilkan Produk", name: "visible", widget: "boolean", default: true, required: false}
